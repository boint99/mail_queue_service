services:
  # ========================
  # RabbitMQ - Message Broker
  # ========================
  rabbitmq:
    image: rabbitmq:latest
    container_name: rabbitmq_service
    restart: always
    ports:
      - "${RABBITMQ_PORT:-5672}:5672" # AMQP protocol
      - "${RABBITMQ_MGMT_PORT:-15672}:15672" # Management UI
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-admin}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASS:-admin123}
      RABBITMQ_DEFAULT_VHOST: ${RABBITMQ_VHOST:-/}
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: [ "CMD", "rabbitmq-diagnostics", "-q", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - mail_service_network

  # ========================
  # Redis - Cache & Rate Limiting
  # ========================
  redis:
    image: redis:latest
    container_name: redis_service
    restart: always
    ports:
      - "${REDIS_PORT:-6379}:6379"
    command: redis-server --requirepass ${REDIS_PASS:-redis123} --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: [ "CMD", "redis-cli", "-a", "${REDIS_PASS:-redis123}", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - mail_service_network

  # ========================
  # postgres - Database
  # ========================
  database:
    image: postgres:17
    container_name: database_service
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "${POSTGRES_PORT}:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER}" ]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - mail_service_network
    volumes:
      - pg_data:/var/lib/postgresql/data
